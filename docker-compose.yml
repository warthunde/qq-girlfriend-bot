# =============================================================
# 纽带乐队四人组 — Docker Compose 配置
# 4 × NapCat (QQ 协议) + 1 × Band Orchestrator (AI 调度)
# =============================================================
#
# 架构：
#   NapCat ×4  ←──WS/HTTP──→  Band Orchestrator  ──HTTP──→  DeepSeek API
#   端口各不同                   (Python asyncio)
#
# 每个 NapCat 容器内部使用相同端口 (3000/3001/6099)
# 宿主机端口映射区分：
#   虹夏:   WS 3001, HTTP 3010, WebUI 6100
#   波奇酱: WS 3002, HTTP 3020, WebUI 6101
#   山田凉: WS 3003, HTTP 3030, WebUI 6102
#   喜多:   WS 3004, HTTP 3040, WebUI 6103
# =============================================================

x-napcat-common: &napcat-common
  image: mlikiowa/napcat-docker:latest
  restart: unless-stopped
  environment:
    NAPCAT_GID: "0"
    NAPCAT_UID: "0"
    WS_ENABLE: "true"
    WS_PORT: "3001"
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ===========================================================
  # NapCat — 虹夏 (伊地知虹夏 / Nijika)
  # QQ 号: ${NIJIKA_QQ}
  # ===========================================================
  napcat_nijika:
    <<: *napcat-common
    container_name: qq_band_nijika
    ports:
      - "${NIJIKA_WS_PORT:-3001}:3001"
      - "${NIJIKA_HTTP_PORT:-3010}:3000"
      - "${NIJIKA_WEBUI_PORT:-6100}:6099"
    volumes:
      - ./napcat_nijika/config:/app/napcat/config
      - ./napcat/qq_data:/app/.config/QQ          # 复用现有登录态
      - ./napcat_nijika/data:/app/.napcat/data
      - ./napcat_nijika/qq:/app/.napcat/qq
      - ./stickers:/app/stickers:ro               # 表情包（只读）

  # ===========================================================
  # NapCat — 波奇酱 (后藤一里 / Bocchi)
  # QQ 号: ${BOCCHI_QQ}
  # ===========================================================
  napcat_bocchi:
    <<: *napcat-common
    container_name: qq_band_bocchi
    ports:
      - "${BOCCHI_WS_PORT:-3002}:3001"
      - "${BOCCHI_HTTP_PORT:-3020}:3000"
      - "${BOCCHI_WEBUI_PORT:-6101}:6099"
    volumes:
      - ./napcat_bocchi/config:/app/napcat/config
      - ./napcat_bocchi/qq_data:/app/.config/QQ
      - ./napcat_bocchi/data:/app/.napcat/data
      - ./napcat_bocchi/qq:/app/.napcat/qq
      - ./stickers:/app/stickers:ro               # 表情包（只读）

  # ===========================================================
  # NapCat — 山田凉 (Yamada Ryo)
  # QQ 号: ${RYO_QQ}
  # ===========================================================
  napcat_ryo:
    <<: *napcat-common
    container_name: qq_band_ryo
    ports:
      - "${RYO_WS_PORT:-3003}:3001"
      - "${RYO_HTTP_PORT:-3030}:3000"
      - "${RYO_WEBUI_PORT:-6102}:6099"
    volumes:
      - ./napcat_ryo/config:/app/napcat/config
      - ./napcat_ryo/qq_data:/app/.config/QQ
      - ./napcat_ryo/data:/app/.napcat/data
      - ./napcat_ryo/qq:/app/.napcat/qq
      - ./stickers:/app/stickers:ro               # 表情包（只读）

  # ===========================================================
  # NapCat — 喜多郁代 (Kita Ikuyo)
  # QQ 号: ${KITA_QQ}
  # ===========================================================
  napcat_kita:
    <<: *napcat-common
    container_name: qq_band_kita
    ports:
      - "${KITA_WS_PORT:-3004}:3001"
      - "${KITA_HTTP_PORT:-3040}:3000"
      - "${KITA_WEBUI_PORT:-6103}:6099"
    volumes:
      - ./napcat_kita/config:/app/napcat/config
      - ./napcat_kita/qq_data:/app/.config/QQ
      - ./napcat_kita/data:/app/.napcat/data
      - ./napcat_kita/qq:/app/.napcat/qq
      - ./stickers:/app/stickers:ro               # 表情包（只读）

  # ===========================================================
  # Band Orchestrator — AI 对话调度引擎
  # 连接 4 个 NapCat，管理消息分发和小剧场
  # ===========================================================
  orchestrator:
    build: ./orchestrator
    container_name: qq_band_orchestrator
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # ── 各 Bot 连接地址（容器内网络）──
      - NIJIKA_WS_URL=ws://napcat_nijika:3001
      - NIJIKA_HTTP_URL=http://napcat_nijika:3000
      - BOCCHI_WS_URL=ws://napcat_bocchi:3001
      - BOCCHI_HTTP_URL=http://napcat_bocchi:3000
      - RYO_WS_URL=ws://napcat_ryo:3001
      - RYO_HTTP_URL=http://napcat_ryo:3000
      - KITA_WS_URL=ws://napcat_kita:3001
      - KITA_HTTP_URL=http://napcat_kita:3000

      # ── DeepSeek API ──
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}

      # ── 乐队配置 ──
      - NIJIKA_QQ=${NIJIKA_QQ}
      - BOCCHI_QQ=${BOCCHI_QQ}
      - RYO_QQ=${RYO_QQ}
      - KITA_QQ=${KITA_QQ}
      - TARGET_GROUP_ID=${TARGET_GROUP_ID}

      # ── 小剧场参数 ──
      - THEATER_INTERVAL_MIN=${THEATER_INTERVAL_MIN:-30}
      - THEATER_INTERVAL_MAX=${THEATER_INTERVAL_MAX:-60}
      - MESSAGE_INTERVAL_MIN=${MESSAGE_INTERVAL_MIN:-5}
      - MESSAGE_INTERVAL_MAX=${MESSAGE_INTERVAL_MAX:-20}

      # ── 人类回复参数 ──
      - HUMAN_REPLY_DELAY_MIN=${HUMAN_REPLY_DELAY_MIN:-3}
      - HUMAN_REPLY_DELAY_MAX=${HUMAN_REPLY_DELAY_MAX:-8}

      # ── 日志 ──
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      - ./orchestrator/logs:/app/logs
      - ./stickers:/app/stickers:ro

    depends_on:
      - napcat_nijika
      - napcat_bocchi
      - napcat_ryo
      - napcat_kita

  # ===========================================================
  # (可选) AstrBot — 保留原有的独立虹夏 Bot
  # 仅在你想要独立使用虹夏 Bot（不通过编排器）时启用
  # 启用方法: docker compose --profile astrbot up -d
  # ===========================================================
  astrbot:
    image: soulter/astrbot:latest
    container_name: qq_bot_astrbot
    restart: unless-stopped
    profiles:
      - astrbot  # 默认不启动，需要 --profile astrbot

    ports:
      - "6185:6185"
      - "6199:6199"

    volumes:
      - ./astrbot/data:/AstrBot/data
      - ./config/astrbot_config.yaml:/AstrBot/data/config.yaml:ro
      - ./stickers:/AstrBot/stickers

    environment:
      - QQ_ACCOUNT=${NIJIKA_QQ}
      - BOT_NICKNAME=${BOT_NICKNAME:-小染}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      - NAPCAT_WS_URL=ws://napcat_nijika:3001
      - NAPCAT_WS_TOKEN=${NAPAT_WS_TOKEN:-}
      - REPLY_DELAY_MIN=${REPLY_DELAY_MIN:-3}
      - REPLY_DELAY_MAX=${REPLY_DELAY_MAX:-8}
      - SIMULATE_TYPING=${SIMULATE_TYPING:-true}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ALLOWED_GROUP_IDS=${ALLOWED_GROUP_IDS:-}
      - BLOCKED_GROUP_IDS=${BLOCKED_GROUP_IDS:-}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS:-}

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
