# =============================================================
# QQ 赛博女友 - Docker Compose 配置
# 使用 AstrBot + NapCat 方案
# =============================================================
#
# 架构说明：
#   NapCat  (QQ 协议层) ←→ AstrBot (AI 对话引擎)
#   端口 3001              端口 6185 (Web 管理后台)
#   端口 6099 (Web UI)
#
# 使用方法：
#   docker compose up -d
# =============================================================


services:
  # =============================================================
  # NapCat - QQ 机器人协议层
  # 负责与 QQ 服务器通信，提供 WebSocket 接口供 AstrBot 连接
  # =============================================================
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: qq_bot_napcat
    restart: unless-stopped

    environment:
      # NapCat 基础配置
      - NAPCAT_GID=0
      - NAPCAT_UID=0
      # 启用 WebSocket 服务（供 AstrBot 连接）
      - WS_ENABLE=true
      # WebSocket 监听端口
      - WS_PORT=3001
      # Token（可选，用于鉴权，留空则不校验）
      - WS_TOKEN=${NAPAT_WS_TOKEN:-}

    ports:
      # NapCat Web UI（用于扫码登录和查看状态）
      - "6099:6099"
      # WebSocket 服务端口（供 AstrBot 连接）
      - "3001:3001"

    volumes:
      # NapCat 持久化数据（登录态、缓存等）
      - ./napcat/data:/app/.napcat/data
      # NapCat 配置文件（OneBot 配置等）
      - ./napcat/config:/app/napcat/config
      # QQ 协议配置文件
      - ./napcat/qq:/app/.napcat/qq
      # QQ 登录态持久化（避免每次重启扫码）
      - ./napcat/qq_data:/app/.config/QQ

    # 注意：NapCat 首次启动需要扫码登录，登录前 WebSocket 不可用
    # 因此不做健康检查，登录后 AstrBot 会自动重连

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================
  # AstrBot - AI 聊天机器人引擎
  # 连接 NapCat 的 WebSocket，负责 AI 对话逻辑
  # =============================================================
  astrbot:
    image: soulter/astrbot:latest
    container_name: qq_bot_astrbot
    restart: unless-stopped

    ports:
      # AstrBot Web 管理后台
      - "6185:6185"
      # AstrBot WebSocket 端口（供 NapCat 反向连接）
      - "6199:6199"

    volumes:
      # AstrBot 数据持久化（配置、插件、日志等）
      - ./astrbot/data:/AstrBot/data
      # AstrBot 配置文件挂载
      - ./config/astrbot_config.yaml:/AstrBot/data/config.yaml:ro

    environment:
      # ---- 基础配置 ----
      # QQ 号码
      - QQ_ACCOUNT=${QQ_ACCOUNT}
      # 机器人昵称
      - BOT_NICKNAME=${BOT_NICKNAME:-小染}

      # ---- AI 模型配置 ----
      # AI 提供商：deepseek / openai
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      # DeepSeek API Key
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # OpenAI API Key（备用）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # AI 模型名称
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      # DeepSeek API Base URL（可切换为国内代理）
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}

      # ---- 人格配置 ----
      # 系统提示词（人格设定）
      - SYSTEM_PROMPT=${SYSTEM_PROMPT}

      # ---- 行为配置 ----
      # 随机延迟回复（秒）
      - REPLY_DELAY_MIN=${REPLY_DELAY_MIN:-3}
      - REPLY_DELAY_MAX=${REPLY_DELAY_MAX:-8}
      # 模拟打字效果
      - SIMULATE_TYPING=${SIMULATE_TYPING:-true}

      # ---- NapCat 连接配置 ----
      # NapCat WebSocket 地址（容器内网络通信）
      - NAPCAT_WS_URL=ws://napcat:3001
      # NapCat WS Token（与上面保持一致）
      - NAPCAT_WS_TOKEN=${NAPAT_WS_TOKEN:-}

    # 等待 NapCat 容器启动后再启动（登录完成后会自动连接）
    depends_on:
      - napcat

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

# =============================================================
# 网络说明
# 两个容器共享 Docker 默认 bridge 网络，
# AstrBot 通过 napcat:3001 访问 NapCat WebSocket
# =============================================================
